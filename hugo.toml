baseURL = 'https://snb2005.github.io/room-of-requirement/'
languageCode = 'en-us'
title = 'Technical Notebook'

relativeURLs = true
canonifyURLs = true

paginate = 10

[permalinks]
math = '/math/:filename/'
cs   = '/cs/:filename/'
cp   = '/cp/:filename/'

[markup]
  defaultMarkdownHandler = 'goldmark'

  [markup.goldmark]
    [markup.goldmark.extensions]
      definitionList = true
      footnote = true
      linkify = true
      strikethrough = true
      table = true
      taskList = true
      typographer = true

    [markup.goldmark.parser]
      autoHeadingID = true
      autoHeadingIDType = 'github'
      wrapStandAloneImageWithinParagraph = false

    [markup.goldmark.renderer]
      unsafe = true

  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = false
    style = 'monokai'
    tabWidth = 4

[taxonomies]
category = 'categories'
tag = 'tags'

[menu]
  [[menu.main]]
    name = 'Home'
    url = '/'
    weight = 1

  [[menu.main]]
    name = 'Math'
    url = '/categories/math/'
    weight = 2

  [[menu.main]]
    name = 'CS'
    url = '/categories/cs/'
    weight = 3

  [[menu.main]]
    name = 'CP'
    url = '/categories/cp/'
    weight = 4

  [[menu.main]]
    name = 'About'
    url = '/about/'
    weight = 5

[params]
description = 'A technical blog on Mathematics, Computer Science, and Competitive Programming'
author = 'Sankalp Navneet Brahmapurkar'
dateFormat = 'January 2, 2006'
math = true
katex = true

[outputs]
home = ['HTML', 'RSS']
section = ['HTML', 'RSS']
page = ['HTML']
taxonomy = ['HTML']
term = ['HTML']